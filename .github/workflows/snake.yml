# Contribution snake generator
# Place at .github/workflows/snake.yml inside the repo named "falltwo".
# It eats your contribution grid into a snake and pushes the SVG to the "output" branch,
# which the README references directly.
# First run: repo Actions tab -> "generate snake" -> Run workflow.
name: generate snake

on:
  schedule:
    - cron: "0 */12 * * *"   # refresh every 12 hours
  workflow_dispatch:          # allow manual trigger
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: generate snake svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: falltwo
          outputs: |
            dist/snake.svg?palette=light&color_snake=B86B4B&color_dots=F5E6D3,E8C9A0,D9A066,C26B4A,B86B4B
            dist/snake-dark.svg?palette=github-dark&color_snake=D9A066&color_dots=2A2420,5C4A3A,8A7A6D,C26B4A,D9A066

      - name: push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
